{% extends "base.html" %}

{% block page_title %}Analytics{% endblock %}

{% block content %}
<div class="analytics-grid">
    <div class="chart-container glass-panel fade-in">
        <h2>Event Distribution</h2>
        <canvas id="eventPieChart"></canvas>
    </div>
    
    <div class="chart-container glass-panel fade-in delay-1">
        <h2>Risk Trend</h2>
        <canvas id="riskLineChart"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                const ctxPie = document.getElementById('eventPieChart').getContext('2d');
                new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: ['Drowsiness', 'Phone', 'Distraction', 'Yawning'],
                        datasets: [{
                            data: [data.drowsiness || 0, data.phone_usage || 0, data.distraction || 0, data.yawning || 0],
                            backgroundColor: ['#ff4757', '#ffb142', '#2ed573', '#1e90ff'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#fff' } }
                        }
                    }
                });
                
                const ctxLine = document.getElementById('riskLineChart').getContext('2d');
                fetch('/api/live')
                    .then((response) => response.json())
                    .then((live) => {
                        const riskScore = Number(live.risk_score || 0);
                        new Chart(ctxLine, {
                            type: 'line',
                            data: {
                                labels: ['5m', '4m', '3m', '2m', '1m', 'Now'],
                                datasets: [{
                                    label: 'Risk Score',
                                    data: [
                                        Math.max(0, riskScore - 15),
                                        Math.max(0, riskScore - 10),
                                        Math.max(0, riskScore - 8),
                                        Math.max(0, riskScore - 5),
                                        Math.max(0, riskScore - 2),
                                        riskScore,
                                    ],
                                    borderColor: '#ff4757',
                                    tension: 0.4,
                                    fill: true,
                                    backgroundColor: 'rgba(255, 71, 87, 0.2)'
                                }]
                            },
                            options: {
                                responsive: true,
                                scales: {
                                    y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } },
                                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } }
                                },
                                plugins: {
                                    legend: { labels: { color: '#fff' } }
                                }
                            }
                        });
                    });
            });
    });
</script>
{% endblock %}
